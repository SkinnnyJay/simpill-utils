# All 38 utils packages: single job runs scripts/ci/run-utils-all-ci.sh (install, build deps, lint, format, typecheck, test:coverage, build).
name: Utils-all CI

on:
  push:
    branches: [main]
    paths:
      - "utils/**"
      - "scripts/ci/**"
      - ".github/workflows/utils-all-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "utils/**"
      - "scripts/ci/**"
      - ".github/workflows/utils-all-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Run utils CI (all packages)
        run: bash scripts/ci/run-utils-all-ci.sh
